<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmad Munawar — Motion Graphics & Video Editor</title>
<meta name="description" content="Ahmad Munawar — Motion Graphics & Video Editor. Commercial advertisements, brand promotions, motion graphics and social media content, edited in Alight Motion.">

<!-- Google Font: Poppins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ============================================================
   0. ROOT VARIABLES
   ============================================================ */
:root{
  --bg:#ffffff;
  --bg-soft:#f4f8ff;
  --bg-deep:#eef4ff;

  --blue-900:#0a2472;
  --blue-700:#0b4bd6;
  --blue-600:#1461ff;
  --blue-500:#3b82f6;
  --blue-400:#63a4ff;
  --blue-300:#93c1ff;
  --blue-100:#dce9ff;

  --glow-a:rgba(20,97,255,0.35);
  --glow-b:rgba(99,164,255,0.28);

  --text-primary:#0a0e1a;
  --text-secondary:#4b5567;
  --text-muted:#8792a3;

  --glass-bg:rgba(255,255,255,0.55);
  --glass-border:rgba(20,97,255,0.14);
  --glass-shadow:0 20px 60px rgba(20,97,255,0.12), 0 4px 16px rgba(10,20,50,0.06);

  --radius-lg:28px;
  --radius-md:22px;
  --radius-sm:14px;

  --space-xs:.5rem;
  --space-sm:1rem;
  --space-md:2rem;
  --space-lg:4rem;
  --space-xl:8rem;

  --ease:cubic-bezier(.22,1,.36,1);
  --nav-h:88px;
}

/* ============================================================
   1. RESET
   ============================================================ */
*,*::before,*::after{ box-sizing:border-box; margin:0; padding:0; }
html{ scroll-behavior:smooth; scroll-padding-top:90px; }
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text-primary);
  overflow-x:hidden;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
img,video{ max-width:100%; display:block; }
a{ text-decoration:none; color:inherit; }
ul{ list-style:none; }
button{ font-family:inherit; border:none; cursor:pointer; background:none; }
::selection{ background:var(--blue-300); color:var(--blue-900); }

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.001ms !important;
    scroll-behavior:auto !important;
  }
}

a:focus-visible, button:focus-visible, .nav-link:focus-visible{
  outline:2px solid var(--blue-600);
  outline-offset:4px;
  border-radius:6px;
}

.container{
  width:100%;
  max-width:1240px;
  margin:0 auto;
  padding:0 clamp(1.25rem, 4vw, 2.5rem);
}

.section{
  position:relative;
  padding:var(--space-xl) 0;
}
.section-inner{ position:relative; z-index:2; }

.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:.5rem;
  font-size:.78rem;
  font-weight:600;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--blue-600);
  margin-bottom:1rem;
}
.eyebrow::before{
  content:"";
  width:8px; height:8px;
  border-radius:50%;
  background:var(--blue-500);
  box-shadow:0 0 0 4px var(--blue-100), 0 0 14px var(--glow-a);
}

.section-title{
  font-size:clamp(2rem, 4vw, 2.9rem);
  font-weight:800;
  letter-spacing:-0.02em;
  line-height:1.15;
  margin-bottom:1rem;
  color:var(--text-primary);
}
.section-sub{
  font-size:1.05rem;
  color:var(--text-secondary);
  max-width:560px;
  font-weight:400;
}
.section-head{
  margin-bottom:var(--space-lg);
}
.section-head.center{
  text-align:center;
  margin-left:auto;
  margin-right:auto;
}
.section-head.center .section-sub{
  margin-left:auto;
  margin-right:auto;
}

/* reveal on scroll */
.reveal{
  opacity:0;
  transform:translateY(36px);
  transition:opacity .9s var(--ease), transform .9s var(--ease);
}
.reveal.is-visible{
  opacity:1;
  transform:translateY(0);
}
.reveal-stagger > *{
  opacity:0;
  transform:translateY(30px);
  transition:opacity .7s var(--ease), transform .7s var(--ease);
}
.reveal-stagger.is-visible > *{
  opacity:1;
  transform:translateY(0);
}

/* ============================================================
   2. BACKGROUND GLOW LAYERS
   ============================================================ */
.bg-glow{
  position:absolute;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:0;
}
.bg-glow span{
  position:absolute;
  border-radius:50%;
  filter:blur(70px);
  opacity:.55;
}
.bg-glow .g1{ width:420px; height:420px; background:var(--blue-400); top:-120px; right:-120px; }
.bg-glow .g2{ width:320px; height:320px; background:var(--blue-300); bottom:-100px; left:-80px; opacity:.4; }

/* ============================================================
   3. NAVIGATION
   ============================================================ */
.navbar{
  position:fixed;
  top:0; left:0; right:0;
  z-index:1000;
  height:var(--nav-h);
  display:flex;
  align-items:center;
  transition:height .4s var(--ease), background .4s var(--ease), box-shadow .4s var(--ease), backdrop-filter .4s var(--ease);
}
.navbar .container{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:100%;
}
.navbar.scrolled{
  height:66px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:0 8px 30px rgba(20,97,255,0.10);
  border-bottom:1px solid var(--glass-border);
}
.brand{
  font-weight:800;
  font-size:1.15rem;
  letter-spacing:-.01em;
  display:flex;
  align-items:center;
  gap:.6rem;
}
.brand-mark{
  width:38px; height:38px;
  border-radius:12px;
  background:linear-gradient(135deg, var(--blue-600), var(--blue-400));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:.95rem;
  box-shadow:0 8px 20px var(--glow-a);
  transition:transform .3s var(--ease);
}
.brand:hover .brand-mark{ transform:rotate(-8deg) scale(1.05); }

.nav-links{
  display:flex;
  align-items:center;
  gap:2.1rem;
}
.nav-link{
  font-size:.92rem;
  font-weight:500;
  color:var(--text-secondary);
  position:relative;
  padding:.3rem 0;
  transition:color .3s var(--ease);
}
.nav-link::after{
  content:"";
  position:absolute;
  left:0; bottom:-4px;
  width:0%; height:2px;
  background:linear-gradient(90deg, var(--blue-600), var(--blue-400));
  border-radius:2px;
  transition:width .35s var(--ease);
}
.nav-link:hover, .nav-link.active{ color:var(--blue-700); }
.nav-link:hover::after, .nav-link.active::after{ width:100%; }

.nav-cta{
  padding:.7rem 1.4rem;
  border-radius:100px;
  background:linear-gradient(135deg, var(--blue-600), var(--blue-500));
  color:#fff;
  font-weight:600;
  font-size:.88rem;
  box-shadow:0 10px 24px var(--glow-a);
  transition:transform .3s var(--ease), box-shadow .3s var(--ease);
}
.nav-cta:hover{ transform:translateY(-2px); box-shadow:0 14px 30px var(--glow-a); }

.nav-toggle{
  display:none;
  width:42px; height:42px;
  border-radius:12px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:5px;
}
.nav-toggle span{
  width:20px; height:2px;
  background:var(--text-primary);
  border-radius:2px;
  transition:transform .35s var(--ease), opacity .35s var(--ease);
}
.nav-toggle.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.nav-toggle.open span:nth-child(2){ opacity:0; }
.nav-toggle.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

.mobile-menu{
  position:fixed;
  top:var(--nav-h); left:0; right:0;
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--glass-border);
  display:flex;
  flex-direction:column;
  padding:1rem clamp(1.25rem,4vw,2.5rem) 2rem;
  gap:.3rem;
  transform:translateY(-12px);
  opacity:0;
  pointer-events:none;
  transition:transform .35s var(--ease), opacity .35s var(--ease);
  z-index:999;
}
.mobile-menu.open{
  transform:translateY(0);
  opacity:1;
  pointer-events:auto;
}
.mobile-menu a{
  padding:.9rem 0;
  font-weight:500;
  border-bottom:1px solid rgba(20,97,255,0.08);
  color:var(--text-secondary);
}

/* ============================================================
   4. HERO
   ============================================================ */
.hero{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  padding-top:var(--nav-h);
  overflow:hidden;
}
.hero-grid{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:clamp(2rem,5vw,4rem);
  align-items:center;
  width:100%;
}
.hero-copy{ position:relative; z-index:2; }

.hero-badge{
  display:inline-flex;
  align-items:center;
  gap:.55rem;
  padding:.5rem 1rem;
  border-radius:100px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(12px);
  font-size:.8rem;
  font-weight:600;
  color:var(--blue-700);
  box-shadow:var(--glass-shadow);
  margin-bottom:1.6rem;
  opacity:0;
}
.hero-badge .dot{
  width:8px; height:8px; border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 0 4px rgba(34,197,94,0.18);
}

.hero-title{
  font-size:clamp(2.6rem, 6vw, 4.6rem);
  font-weight:900;
  line-height:1.03;
  letter-spacing:-0.03em;
  color:var(--text-primary);
  opacity:0;
}
.hero-title .grad{
  background:linear-gradient(100deg, var(--blue-700), var(--blue-500) 45%, var(--blue-400));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.hero-subtitle{
  margin-top:1.1rem;
  font-size:clamp(1.1rem, 2vw, 1.35rem);
  font-weight:600;
  color:var(--blue-600);
  opacity:0;
}

.hero-text{
  margin-top:1.3rem;
  max-width:520px;
  font-size:1rem;
  color:var(--text-secondary);
  opacity:0;
}

.hero-actions{
  margin-top:2.3rem;
  display:flex;
  flex-wrap:wrap;
  gap:1rem;
  opacity:0;
}

.btn{
  position:relative;
  overflow:hidden;
  display:inline-flex;
  align-items:center;
  gap:.6rem;
  padding:1rem 1.9rem;
  border-radius:100px;
  font-weight:600;
  font-size:.95rem;
  transition:transform .35s var(--ease), box-shadow .35s var(--ease);
  isolation:isolate;
}
.btn-primary{
  background:linear-gradient(135deg, var(--blue-600), var(--blue-500));
  color:#fff;
  box-shadow:0 14px 34px var(--glow-a);
}
.btn-primary:hover{ transform:translateY(-3px); box-shadow:0 20px 44px var(--glow-a); }
.btn-outline{
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  color:var(--blue-700);
  backdrop-filter:blur(10px);
}
.btn-outline:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,0.85);
  box-shadow:0 14px 30px rgba(20,97,255,0.10);
}

.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);
  animation:rippleAnim .65s ease-out;
  background:rgba(255,255,255,0.55);
  pointer-events:none;
  z-index:1;
}
.btn-outline .ripple{ background:rgba(20,97,255,0.18); }
@keyframes rippleAnim{
  to{ transform:scale(3.2); opacity:0; }
}

.hero-stats{
  margin-top:3rem;
  display:flex;
  gap:clamp(1.4rem,4vw,2.6rem);
  opacity:0;
}
.hero-stat b{
  display:block;
  font-size:1.7rem;
  font-weight:800;
  color:var(--text-primary);
}
.hero-stat span{
  font-size:.82rem;
  color:var(--text-muted);
  font-weight:500;
}

/* hero visual */
.hero-visual{
  position:relative;
  height:clamp(340px, 46vw, 560px);
  display:flex;
  align-items:center;
  justify-content:center;
}
.orb-field{
  position:absolute;
  inset:0;
}
.orb{
  position:absolute;
  border-radius:50%;
  background:radial-gradient(circle at 32% 30%, var(--blue-300), var(--blue-600) 70%);
  filter:blur(1px);
  box-shadow:0 0 60px var(--glow-a), inset 0 0 40px rgba(255,255,255,0.25);
  animation:floatY 7s ease-in-out infinite;
}
.orb.o1{ width:200px; height:200px; top:6%; left:8%; animation-duration:8s; }
.orb.o2{ width:130px; height:130px; top:52%; left:0%; animation-duration:6.2s; animation-delay:.6s; opacity:.85; }
.orb.o3{ width:90px; height:90px; top:10%; right:6%; animation-duration:5.4s; animation-delay:.3s; opacity:.8;}
.orb.o4{ width:260px; height:260px; bottom:0%; right:2%; animation-duration:9s; opacity:.7; }
.orb.o5{ width:60px; height:60px; bottom:14%; left:30%; animation-duration:5s; animation-delay:1s; }

@keyframes floatY{
  0%,100%{ transform:translateY(0) translateX(0); }
  50%{ transform:translateY(-26px) translateX(10px); }
}

.hero-glass-card{
  position:relative;
  z-index:2;
  width:min(320px, 80%);
  padding:1.8rem;
  border-radius:var(--radius-lg);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(18px) saturate(160%);
  -webkit-backdrop-filter:blur(18px) saturate(160%);
  box-shadow:var(--glass-shadow);
  animation:floatCard 6s ease-in-out infinite;
}
@keyframes floatCard{
  0%,100%{ transform:translateY(0) rotate(-1.2deg); }
  50%{ transform:translateY(-14px) rotate(1deg); }
}
.hero-glass-card h4{
  font-size:.95rem; font-weight:700; margin-bottom:.4rem;
}
.hero-glass-card p{ font-size:.82rem; color:var(--text-secondary); margin-bottom:1rem; }
.wave-bars{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:46px;
}
.wave-bars i{
  flex:1;
  border-radius:4px;
  background:linear-gradient(180deg, var(--blue-400), var(--blue-600));
  animation:waveAnim 1.4s ease-in-out infinite;
}
.wave-bars i:nth-child(1){ animation-delay:0s; }
.wave-bars i:nth-child(2){ animation-delay:.12s; }
.wave-bars i:nth-child(3){ animation-delay:.24s; }
.wave-bars i:nth-child(4){ animation-delay:.36s; }
.wave-bars i:nth-child(5){ animation-delay:.48s; }
.wave-bars i:nth-child(6){ animation-delay:.6s; }
.wave-bars i:nth-child(7){ animation-delay:.72s; }
@keyframes waveAnim{
  0%,100%{ height:20%; }
  50%{ height:100%; }
}

.scroll-cue{
  position:absolute;
  bottom:2rem;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.5rem;
  color:var(--text-muted);
  font-size:.72rem;
  letter-spacing:.1em;
  text-transform:uppercase;
  opacity:0;
  z-index:2;
}
.scroll-cue .line{
  width:1px; height:34px;
  background:linear-gradient(180deg, var(--blue-500), transparent);
  animation:scrollLine 1.8s ease-in-out infinite;
}
@keyframes scrollLine{
  0%{ transform:scaleY(0); transform-origin:top; }
  50%{ transform:scaleY(1); transform-origin:top; }
  50.1%{ transform-origin:bottom; }
  100%{ transform:scaleY(0); transform-origin:bottom; }
}

/* ============================================================
   5. ABOUT
   ============================================================ */
.about{
  background:linear-gradient(180deg, #ffffff, var(--bg-soft));
}
.about-grid{
  display:grid;
  grid-template-columns:.85fr 1.15fr;
  gap:clamp(2rem,5vw,4rem);
  align-items:center;
}
.about-visual{
  position:relative;
  aspect-ratio:1/1;
  max-width:420px;
}
.about-frame{
  position:relative;
  width:100%; height:100%;
  border-radius:32px;
  background:linear-gradient(155deg, var(--blue-100), #ffffff 60%);
  border:1px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.about-frame::before{
  content:"";
  position:absolute;
  width:220px; height:220px;
  background:var(--blue-400);
  filter:blur(60px);
  opacity:.5;
  top:-40px; right:-40px;
}
.about-initials{
  font-size:6rem;
  font-weight:900;
  background:linear-gradient(135deg, var(--blue-700), var(--blue-400));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  position:relative;
  z-index:2;
}
.about-chip{
  position:absolute;
  bottom:-18px;
  left:-18px;
  padding:.9rem 1.2rem;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);
  backdrop-filter:blur(14px);
  box-shadow:var(--glass-shadow);
  font-size:.82rem;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:.6rem;
  z-index:3;
}
.about-chip .pulse{
  width:10px; height:10px; border-radius:50%;
  background:var(--blue-500);
  box-shadow:0 0 0 0 var(--glow-a);
  animation:pulseGlow 2s infinite;
}
@keyframes pulseGlow{
  0%{ box-shadow:0 0 0 0 var(--glow-a); }
  70%{ box-shadow:0 0 0 14px rgba(20,97,255,0); }
  100%{ box-shadow:0 0 0 0 rgba(20,97,255,0); }
}

.about-copy p{
  color:var(--text-secondary);
  margin-bottom:1.1rem;
  font-size:1.02rem;
}
.about-copy strong{ color:var(--text-primary); }
.about-tags{
  display:flex;
  flex-wrap:wrap;
  gap:.6rem;
  margin-top:1.6rem;
}
.about-tags span{
  padding:.55rem 1.05rem;
  border-radius:100px;
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  font-size:.82rem;
  font-weight:500;
  color:var(--blue-700);
  transition:transform .3s var(--ease), box-shadow .3s var(--ease);
}
.about-tags span:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 22px rgba(20,97,255,0.14);
}

/* ============================================================
   6. SERVICES
   ============================================================ */
.services-grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:1.6rem;
}
.service-card{
  position:relative;
  padding:2.2rem 1.9rem;
  border-radius:var(--radius-md);
  background:var(--glass-bg);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(16px) saturate(160%);
  -webkit-backdrop-filter:blur(16px) saturate(160%);
  box-shadow:var(--glass-shadow);
  overflow:hidden;
  transition:transform .45s var(--ease), box-shadow .45s var(--ease), border-color .45s var(--ease);
}
.service-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(220px circle at var(--mx,50%) var(--my,0%), rgba(20,97,255,0.16), transparent 70%);
  opacity:0;
  transition:opacity .4s var(--ease);
  pointer-events:none;
}
.service-card:hover::before{ opacity:1; }
.service-card:hover{
  transform:translateY(-10px);
  box-shadow:0 26px 60px rgba(20,97,255,0.20);
  border-color:rgba(20,97,255,0.3);
}
.service-icon{
  width:60px; height:60px;
  border-radius:18px;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg, var(--blue-600), var(--blue-400));
  box-shadow:0 12px 26px var(--glow-a);
  margin-bottom:1.4rem;
  transition:transform .4s var(--ease);
}
.service-card:hover .service-icon{ transform:rotate(-6deg) scale(1.06); }
.service-icon svg{ width:28px; height:28px; stroke:#fff; }
.service-card h3{
  font-size:1.18rem;
  font-weight:700;
  margin-bottom:.6rem;
  letter-spacing:-.01em;
}
.service-card p{
  font-size:.92rem;
  color:var(--text-secondary);
}

/* ============================================================
   7. SKILLS
   ============================================================ */
.skills{
  background:linear-gradient(180deg, var(--bg-soft), #ffffff);
}
.skills-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1.6rem 3rem;
}
.skill-item{ padding:.4rem 0; }
.skill-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:.6rem;
  font-weight:600;
  font-size:.95rem;
}
.skill-top span.pct{ color:var(--blue-600); font-weight:700; }
.skill-track{
  width:100%;
  height:12px;
  border-radius:100px;
  background:var(--blue-100);
  overflow:hidden;
  position:relative;
  box-shadow:inset 0 1px 3px rgba(20,97,255,0.15);
}
.skill-fill{
  height:100%;
  width:0%;
  border-radius:100px;
  background:linear-gradient(90deg, var(--blue-600), var(--blue-400));
  position:relative;
  transition:width 1.4s var(--ease);
  box-shadow:0 0 14px var(--glow-a);
}
.skill-fill::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  animation:shimmer 2.2s linear infinite;
  animation-play-state:paused;
}
.skill-item.filled .skill-fill::after{ animation-play-state:running; }
@keyframes shimmer{
  0%{ transform:translateX(-100%); }
  100%{ transform:translateX(220%); }
}
